# Guma AI — local development stack
# Runs: crawler + generator + outreach workers + Redis
# Frontend runs separately via: cd apps/frontend && pnpm dev

services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  crawler-api:
    build:
      context: ./apps/crawler
      dockerfile: Dockerfile
    restart: on-failure
    command: node src/api.js
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    env_file: ./apps/crawler/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3001
    volumes:
      - ./apps/crawler/logs:/app/logs

  crawler-worker:
    build:
      context: ./apps/crawler
      dockerfile: Dockerfile
    restart: unless-stopped
    command: node src/queue/worker.js
    depends_on:
      redis:
        condition: service_healthy
    env_file: ./apps/crawler/.env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./apps/crawler/logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 1g   # Playwright needs headroom

  generator-api:
    build:
      context: ./apps/generator
      dockerfile: Dockerfile
    restart: on-failure
    command: node src/api.js
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3002:3002"
    env_file: ./apps/generator/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3002
    volumes:
      - ./apps/generator/logs:/app/logs

  generator-worker:
    build:
      context: ./apps/generator
      dockerfile: Dockerfile
    restart: unless-stopped
    command: node src/queue/worker.js
    depends_on:
      redis:
        condition: service_healthy
    env_file: ./apps/generator/.env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./apps/generator/logs:/app/logs

  outreach-worker:
    build:
      context: ./apps/outreach
      dockerfile: Dockerfile
    restart: unless-stopped
    command: node src/index.js
    depends_on:
      redis:
        condition: service_healthy
    env_file: ./apps/outreach/.env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./apps/outreach/logs:/app/logs

  # Optional: BullMQ dashboard for queue monitoring
  bull-board:
    image: deadly0/bull-board
    restart: unless-stopped
    ports:
      - "3010:3000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BULL_PREFIX=bull

volumes:
  redis_data:
